  <!-- Text: Home Improvement -->
  <text x="72" y="44" font-family="'Barlow', Arial, sans-serif" font-weight="500" font-size="10.5" fill="rgba(255,255,255,0.65)" letter-spacing="3.5">HOME IMPROVEMENT</text>
